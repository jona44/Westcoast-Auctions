{% extends "base.html" %}
{% block title %}Log In - Auction Platform{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 mt-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
        <p class="text-slate-500 mt-2">Log in to your account and keep track of your bids.</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div class="space-y-4">
            {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-slate-700 mb-1.5">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
        </div>
        
        <div class="pt-2">
            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-slate-100 transition-all hover:-translate-y-0.5 active:translate-y-0">
                Log In
            </button>
        </div>
    </form>

    <div class="mt-8 pt-8 border-t border-slate-100 text-center">
        <p class="text-slate-500 text-sm">Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline">Register today</a></p>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Delete {{ listing.title }} - Auction Platform{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-10 rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 mt-10 text-center">
    <div class="w-20 h-20 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
    </div>
    
    <h2 class="text-3xl font-black text-slate-900 tracking-tight mb-4">Are you sure?</h2>
    <p class="text-slate-500 mb-8">You are about to permanently delete <span class="font-bold text-slate-900">"{{ listing.title }}"</span>. This action cannot be revoked.</p>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-100 transition-all hover:-translate-y-0.5 active:translate-y-0">
            Yes, Delete Permanently
        </button>
        <a href="{% url 'listing_detail' listing.id %}" class="block w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-xl transition-all">
            No, Keep Listing
        </a>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Payment Successful - Auction Platform{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-12 rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 mt-10 text-center">
    <div class="w-24 h-24 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-10 text-4xl shadow-lg shadow-green-100/50">
        ✨
    </div>
    
    <h2 class="text-4xl font-black text-slate-900 tracking-tight mb-4">Payment Success</h2>
    <p class="text-slate-500 mb-10 leading-relaxed">Your payment has been successfully processed! The seller will reach out to you shortly for shipping details.</p>

    <a href="{% url 'listing_list' %}" class="block w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-5 rounded-2xl shadow-xl shadow-slate-200 transition-all hover:-translate-y-1 active:scale-[0.98]">
        Browse More Auctions
    </a>
</div>
{% endblock %}
